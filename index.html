// ── COLLAPSIBLE CARDS ──
function initCollapsible() {
  document.querySelectorAll('.hcard').forEach(function(card) {
    // Skip if already initialized
    if (card.querySelector('.card-hdr')) return;
    var hl = card.querySelector(':scope > .hl');
    if (!hl) return;

    // Build header row: [hl label] [chevron]
    var hdr = document.createElement('div');
    hdr.className = 'card-hdr';
    card.insertBefore(hdr, hl);
    hdr.appendChild(hl);
    var chev = document.createElement('span');
    chev.className = 'card-chev';
    chev.textContent = '▾';
    hdr.appendChild(chev);

    // Wrap all remaining children in .card-body
    var body = document.createElement('div');
    body.className = 'card-body';
    while (card.children[1]) body.appendChild(card.children[1]);
    card.appendChild(body);

    hdr.addEventListener('click', function() {
      card.classList.toggle('collapsed');
    });
  });
}

// ══ COMPARE DELTAS ══
function renderDeltas(s0,s1){
  if(!s0||!s1) return;
  var pairs=[
    ['rp',null,'pop'],['ri',null,'income'],
    ['rd',null,'density'],['rh',null,'hu'],
    ['hhsz',null,'hhsz'],['hmv',null,'hmv']
  ];
  // For each metric in slot 1, compute delta vs slot 0
  var metrics={};
  ['pop','inc','density','hu','hhsz','hmv'].forEach(function(k){
    var v0=slotCache[0][k], v1=slotCache[1][k];
    if(!v0||!v1) return;
    var delta=(v1-v0)/v0*100;
    var sign=delta>0?'pos':delta<0?'neg':'neu';
    var label=(delta>0?'+':'')+delta.toFixed(1)+'%';
    metrics[k]={delta:delta,sign:sign,label:label};
  });
  // Attach delta badges to slot 1 values
  var targets={
    'pop':'rp-1','inc':'ri-1','density':'rd-1',
    'hu':'rh-1','hhsz':'hhsz-1','hmv':'hmv-1'
  };
  for(var k in metrics){
    var target=el(targets[k]);
    if(!target) continue;
    // Remove existing delta
    var existing=target.parentNode.querySelector('.delta');
    if(existing) existing.remove();
    var badge=document.createElement('span');
    badge.className='delta '+metrics[k].sign;
    badge.textContent=metrics[k].label;
    target.insertAdjacentElement('afterend',badge);
  }
}

function simplifyPoly(coords,targetPoints){
  if(coords.length<=targetPoints) return coords;
  var step=Math.floor(coords.length/targetPoints);
  var out=[];
  for(var i=0;i<coords.length;i+=step){out.push(coords[i]);}
  out.push(coords[0]); // close ring
  return out;
}

async function fetchBGsPolygon(rings){
  // rings: array of [lon,lat] pairs (ESRI ring format)
  var geomObj=JSON.stringify({rings:[rings],spatialReference:{wkid:4326}});
  var url='https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Tracts_Blocks/MapServer/11/query'
    +'?geometry='+encodeURIComponent(geomObj)
    +'&geometryType=esriGeometryPolygon'
    +'&spatialRel=esriSpatialRelIntersects'
    +'&outFields=GEOID,CENTLAT,CENTLON,POP100,HU100&returnGeometry=false&f=json';
  var r=await fetch(url);
  if(!r.ok) throw new Error('Census polygon query failed');
  var d=await r.json();
  if(d.error) throw new Error('Census: '+d.error.message);
  return(d.features||[]).map(function(f){return f.attributes;}).filter(function(bg){return bg.CENTLAT&&bg.CENTLON;});
}

async function runDriveAnalysis(s,lat,lon,min){
  var statusEl=el('drive-status');
  if(statusEl) statusEl.textContent='Analyzing '+min+'-min drive…';

  try{
    // Fetch isochrone
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort();},15000);
    var resp=await fetch('https://valhalla1.openstreetmap.de/isochrone',{
      method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({locations:[{lon:lon,lat:lat}],costing:'auto',contours:[{time:min}],polygons:true})
    });
    clearTimeout(tid);
    if(!resp.ok) throw new Error('Isochrone failed');
    var iso=await resp.json();
    var feature=iso.features&&iso.features[0];
    if(!feature) throw new Error('No polygon');

    // Get coords [lon,lat] and simplify
    var rawCoords=feature.geometry.coordinates[0]; // [lon,lat] pairs
    var simplified=simplifyPoly(rawCoords,80);
    // Convert to ESRI ring format (already [lon,lat])
    var rings=simplified;

    // Draw isochrone on map (slot-specific)
    if(driveLayer[s]){MAP.removeLayer(driveLayer[s]);driveLayer[s]=null;}
    var dColor=compareMode?(s===0?'#4b7cf3':'#f59e42'):'#f59e42';
    driveLayer[s]=L.geoJSON(iso,{style:function(){ var c=dColor; return{color:c,fillColor:c,fillOpacity:0.08,weight:2.5,opacity:0.85,dashArray:'5 4'};}}).addTo(MAP);
    driveActive=true;
    if(statusEl) statusEl.textContent=min+'-min drive radius';
    var dsn=el('drive-status-new');if(dsn)dsn.textContent=min+' min';

    // Query Census with polygon
    var bgs=await fetchBGsPolygon(rings);
    if(!bgs.length) throw new Error('No block groups in drive time area');

    // Calculate stats
    var pop=0,hu=0;
    bgs.forEach(function(bg){pop+=bg.POP100||0;hu+=bg.HU100||0;});
    var approxArea=polygonAreaSqMi(rawCoords); // shoelace formula

    var stateFips=bgs[0].GEOID.slice(0,2);
    var [incData,bizData,stateData,data2010]=await Promise.all([
      fetchIncomeLabor(bgs),
      fetchBiz(lat,lon,Math.sqrt(approxArea/Math.PI)||5),
      fetchState(stateFips),
      fetch2010(bgs)
    ]);

    // Store results
    driveCache[s]={pop:pop,hu:hu,approxArea:approxArea,bgs:bgs,
      incData:incData,bizData:bizData,stateData:stateData,data2010:data2010,
      lat:lat,lon:lon,min:min,polyRing:rings,tenureData:null};
    // Fetch tenure separately so it can't break drive analysis
    fetchTenure(bgs).then(function(t){if(driveCache[s])driveCache[s].tenureData=t;renderTenure(s,t,stateData);}).catch(function(){});

    applyDriveResults(s,driveCache[s]);

    // Show toggle
    el('mode-toggle').classList.add('vis');

  }catch(e){
    if(statusEl) statusEl.textContent='Drive time analysis failed';
    // Don't call setAnalysisMode — that would reset the other slot too
    // Just clear this slot's drive layer and show error
    if(driveLayer[s]){MAP.removeLayer(driveLayer[s]);driveLayer[s]=null;}
    console.warn('Drive time failed for slot',s,e);
  }
}

function applyDriveResults(s,cache){
  if(!cache) return;
  stopPulse(); // Remove green pulse circle from drive geocode
  clearSteps();
  // Clear previous circle + marker so only drive polygon shows
  if(circles[s]){MAP.removeLayer(circles[s]);circles[s]=null;}
  if(markers[s]){MAP.removeLayer(markers[s]);markers[s]=null;}
  // Draw a simple center pin for drive mode
  var pinCol=compareMode?(s===0?'#4b7cf3':'#f59e42'):'#f59e42';
  var pinGlow=compareMode&&s===0?'rgba(75,124,243,.4)':'rgba(245,158,66,.4)';
  var dIcon=L.divIcon({html:'<div style="width:10px;height:10px;background:'+pinCol+';border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 3px '+pinGlow+'"></div>',iconSize:[10,10],iconAnchor:[5,5],className:''});
  markers[s]=L.marker([cache.lat,cache.lon],{icon:dIcon}).addTo(MAP);
  // Fit map (final fit handled by run() post-analysis; this handles single-slot drive)
  if(driveLayer[s]&&!compareMode) try{
    MAP.fitBounds(driveLayer[s].getBounds(),{padding:[50,50]});
  }catch(e){}
  slotCache[s].area=cache.approxArea;
  // Re-run EPA with drive polygon
    renderPop(s,cache.pop,cache.hu,cache.approxArea);
  el('rs-'+s).textContent='within '+cache.min+'-min drive · '+fmt(cache.hu)+' housing units';
  slotCache[s].stateData=cache.stateData;
  if(cache.incData) renderIncome(s,cache.incData.income,cache.incData.lfpr,cache.incData.unempRate,cache.incData.bachRate,cache.incData.homeValue,cache.incData.workingAgePop,cache.hu,cache.stateData);
  else renderIncome(s,null,null,null,null,null,null,null,cache.stateData);
  renderBiz(s,cache.bizData,cache.stateData);
  renderTenure(s,cache.tenureData!==undefined?cache.tenureData:null,cache.stateData);
  renderGrowth(s,cache.pop,cache.data2010);
  renderComparisons(s,cache.pop,cache.approxArea,cache.stateData);

async function fetchIsochrone(min){
  var center = slotCache[0] && slotCache[0].lat ? [slotCache[0].lat, slotCache[0].lon] : null;
  // Get center from current marker
  if(!center && markers[0]){
    var ll = markers[0].getLatLng();
    center = [ll.lat, ll.lng];
  }
  if(!center){ el('drive-status').textContent='Run analysis first'; return; }

  el('drive-status').textContent = 'Loading…';
  if(driveLayer[0]){ MAP.removeLayer(driveLayer[0]); driveLayer[0]=null; }

  try{
    var ctrl = new AbortController();
    var tid = setTimeout(function(){ctrl.abort();}, 15000);
    var resp = await fetch('https://valhalla1.openstreetmap.de/isochrone', {
      method: 'POST',
      signal: ctrl.signal,
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        locations: [{lon: center[1], lat: center[0]}],
        costing: 'auto',
        contours: [{time: min}],
        polygons: true
      })
    });
    clearTimeout(tid);
    if(!resp.ok) throw new Error('API error');
    var data = await resp.json();
    if(!data.features || !data.features.length) throw new Error('No polygon');

    driveLayer[0] = L.geoJSON(data, {
      style: function(){
        return {
          color: '#f59e42',
          fillColor: '#f59e42',
          fillOpacity: 0.07,
          weight: 2,
          opacity: 0.7,
          dashArray: '6 4'
        };
      }
    }).addTo(MAP);

    driveActive = true;
    el('drive-status').textContent = min + '-min drive radius';
  }catch(e){
    el('drive-status').textContent = 'Unavailable';
  }
}

var STATUS_COLORS={owned:'#3ecf8e',target:'#4b7cf3',loi:'#f59e42',sold:'#6a768f'};

async function analyzeAll(){
  var props=getPortfolio();
  if(!props.length) return;
  var btn=el('port-analyze-btn');
  btn.textContent='Analyzing…';btn.classList.add('running');
  var pb=el('port-progress-bar');
  var pf=el('port-progress-fill');
  pb.classList.add('vis');pf.style.width='0%';
  clearPortCircles();

  var total=props.length;
  var done=0;

  var allHwyElements=[];
  // Re-render with queued state on all cards
  renderPortfolio();
  props.forEach(function(p){
    var card=el('pc-'+p.id);
    if(card) card.classList.add('queued');
  });

  // Run in batches of 2 to avoid hammering Census API
  var results={};
  for(var i=0;i<props.length;i+=2){
    var batch=props.slice(i,i+2);
    btn.textContent='Analyzing '+(i+1)+'/'+total+(i+1<total?'-'+Math.min(i+2,total):'')+'…';
    await Promise.all(batch.map(async function(p){
      var card=el('pc-'+p.id);
      if(card){card.classList.remove('queued');card.classList.add('analyzing');}
      try{
        // Geocode if no lat/lon
        var lat=p.lat,lon=p.lon;
        if(!lat||!lon){
          var geo=await geocode(p.address);
          lat=geo.lat;lon=geo.lon;
        }
        var r=p.radius||5;
        var bgs=await fetchBGs(lat,lon,r);
        if(!bgs.length) throw new Error('No data');
        var pop=0,hu=0;
        bgs.forEach(function(bg){pop+=bg.POP100||0;hu+=bg.HU100||0;});
        var area=Math.PI*r*r;
        var stateFips=bgs[0].GEOID.slice(0,2);
        var incData=await fetchIncomeLabor(bgs);
        var stateData=await fetchState(stateFips);
        var data2010=await fetch2010(bgs);
        var hwyResult=await fetchHwy(lat,lon);
        if(hwyResult&&hwyResult.elements) hwyResult.elements.forEach(function(e){allHwyElements.push(e);});

        var natExp=Math.round(NAT_DENSITY*area);

        // Store results
        results[p.id]={
          lat:lat,lon:lon,pop:pop,hu:hu,
          density:Math.round(pop/area),
          income:incData?incData.income:0,
          hmv:incData?incData.homeValue:0,
          hhsz:hu>0?pop/hu:0,
          lfpr:incData&&incData.lfpr?pct(incData.lfpr*100):'',
          unemp:incData&&incData.unempRate?pct(incData.unempRate*100):'',
          bach:incData&&incData.bachRate?pct(incData.bachRate*100):'',
          wapop:incData?incData.workingAgePop:0,
          pop10:data2010?data2010.pop:0,
          growthNote:data2010&&data2010.pop?(function(){
            var d=pop-data2010.pop,pc=d/data2010.pop*100;
            return(d>=0?'\u25b2':'\u25bc')+' '+Math.abs(d).toLocaleString()+' ('+Math.abs(pc).toFixed(1)+'%) since 2010';
          })():'',
          natComp:(pop/natExp).toFixed(1)+'\u00d7 national avg',
          radius:r
        };

        // Draw circle on map
        var color=STATUS_COLORS[p.status]||'#4b7cf3';
        var circle=L.circle([lat,lon],{
          radius:r*1609.34,color:color,fillColor:color,
          fillOpacity:0.06,weight:2,opacity:0.5,dashArray:'4 3'
        }).addTo(MAP);
        circle.bindTooltip('<b>'+p.name+'</b><br>'+Math.round(pop/1000)+'K pop · $'+Math.round((incData&&incData.income||0)/1000)+'K HHI',{sticky:true});
        portCircles.push(circle);

        if(card){card.classList.remove('analyzing','queued');card.classList.add('analyzed');}
      }catch(e){
        if(card){card.classList.remove('analyzing','queued');}
      }
      done++;
      pf.style.width=Math.round(done/total*100)+'%';
    }));
  }

  // Save results back to portfolio
  var updated=getPortfolio().map(function(p){
    var r=results[p.id];
    return r?Object.assign({},p,r):p;
  });
  setPortfolio(updated);

  // Draw all highways
  if(allHwyElements.length) drawHighways(allHwyElements);
  // Re-render cards with stats + fit map
  renderPortfolio();
  renderPortPins();
  if(portCircles.length){
    var grp=L.featureGroup(portCircles.concat(portPins));
    MAP.fitBounds(grp.getBounds().pad(0.15));
  }

  btn.textContent='\u2713 Analyzed';btn.classList.remove('running');
  setTimeout(function(){btn.textContent='\u27f3 Analyze All';},3000);
  pb.classList.remove('vis');pf.style.width='0%';
}


// Shoelace formula for polygon area (coords = [[lon,lat],...])
function polygonAreaSqMi(coords){
  var n=coords.length;
  if(n<3) return 0;
  var area=0;
  for(var i=0;i<n;i++){
    var j=(i+1)%n;
    area+=coords[i][0]*coords[j][1];
    area-=coords[j][0]*coords[i][1];
  }
  area=Math.abs(area)/2;
  // Convert from degrees² to sq miles (1 deg lat ≈ 69mi, 1 deg lon ≈ 69*cos(lat) mi)
  var midLat=coords.reduce(function(s,c){return s+c[1];},0)/n;
  var latMi=69.0;
  var lonMi=69.0*Math.cos(midLat*Math.PI/180);
  return area*latMi*lonMi;
}

// ── HIGHWAY MAP LAYER ──
var hwyMapLayer=null;

var hwyElementsAll=[];
function drawHighways(elements,replace){
  if(replace) hwyElementsAll=[];
  if(elements&&elements.length){
    // Merge new elements, skip duplicates by way id
    var seen=new Set(hwyElementsAll.map(function(e){return e.id;}));
    elements.forEach(function(e){if(!seen.has(e.id)) hwyElementsAll.push(e);});
  }
  if(hwyMapLayer){MAP.removeLayer(hwyMapLayer);hwyMapLayer=null;}
  if(!hwyElementsAll.length) return;
  var elements=hwyElementsAll;

  hwyMapLayer=L.layerGroup().addTo(MAP);

  // Group segments by ref, tracking highway type
  var seen={};
  elements.forEach(function(el){
    var tags=el.tags||{};
    var ref=tags.ref||tags.name||'';
    var hwType=tags.highway||'';
    if(!ref||!el.geometry||!el.geometry.length) return;
    if(!seen[ref]) seen[ref]={coords:[],type:hwType};
    // Prefer motorway type if already seen
    if(hwType==='motorway') seen[ref].type='motorway';
    seen[ref].coords.push(el.geometry.map(function(pt){return [pt.lat,pt.lon];}));
  });

  Object.keys(seen).forEach(function(ref){
    var entry=seen[ref];
    var isinterstate=entry.type==='motorway';
    var lineColor=isinterstate?'#4b7cf3':'#60a5fa'; // blue for interstate, lighter blue for state
    
    
    var allCoords=[];

    entry.coords.forEach(function(coords){
      if(coords.length<2) return;
      L.polyline(coords,{
        color:lineColor,weight:isinterstate?3:2.5,opacity:isinterstate?0.6:0.5,
        lineJoin:'round',lineCap:'round'
      }).addTo(hwyMapLayer);
      allCoords=allCoords.concat(coords);
    });

    // Label at midpoint
    if(allCoords.length){
      var mid=allCoords[Math.floor(allCoords.length/2)];
      var labelClass=isinterstate?'hwy-label':'hwy-label hwy-label-state';
      L.marker([mid[0],mid[1]],{
        icon:L.divIcon({
          className:labelClass,
          html:'<span>'+ref+'</span>',
          iconSize:[0,0],iconAnchor:[0,0]
        }),
        interactive:false,zIndexOffset:-100
      }).addTo(hwyMapLayer);
    }
  });
}

// ── COUNT-UP ANIMATION ──
function animateNumber(el, targetText, delay) {
  if(!el) return;
  // Strip commas before parsing to avoid offset bugs
  var stripped = targetText.replace(/,/g,'');
  var numMatch = stripped.match(/[\d.]+/);
  if(!numMatch) { el.textContent=targetText; el.classList.add('loaded'); return; }
  var target = parseFloat(numMatch[0]);
  var prefix = stripped.slice(0, stripped.search(/[\d]/));
  var suffix = stripped.slice(stripped.search(/[\d]/)+numMatch[0].length);
  var isInt = !stripped.includes('.');
  var duration = 600;
  var start = null;
  el.classList.remove('pending');
  setTimeout(function(){
    el.classList.add('loaded');
    function step(ts){
      if(!start) start=ts;
      var progress=Math.min((ts-start)/duration,1);
      var ease=1-Math.pow(1-progress,3);
      var cur=target*ease;
      if(isInt){
        el.textContent=prefix+Math.round(cur).toLocaleString('en-US')+suffix;
      } else {
        el.textContent=prefix+cur.toFixed(1)+suffix;
      }
      if(progress<1) requestAnimationFrame(step);
      else el.textContent=prefix+(isInt?target.toLocaleString('en-US'):target.toFixed(1))+suffix;
    }
    requestAnimationFrame(step);
  }, delay||0);
}

// Pulsing circle during analysis
var rippleLayers=[];
function showPulse(lat,lon,r){
  stopPulse();
  pulseCircle=L.circle([lat,lon],{
    radius:r*1609.34,color:'#3ecf8e',fillColor:'#3ecf8e',
    fillOpacity:.03,weight:1.5,opacity:.6,dashArray:'6 4'
  }).addTo(MAP);
  MAP.fitBounds(pulseCircle.getBounds(),{padding:[40,40]});
  startRipples(lat,lon,r);
}
function startRipples(lat,lon,r){
  stopRipples();
  // Use Leaflet setStyle for reliable opacity control
  var maxR=r*1609.34;
  var durations=[1800,1800,1800];
  var delays=[0,600,1200];
  durations.forEach(function(dur,i){
    var ring=L.circle([lat,lon],{
      radius:100,color:'#3ecf8e',fill:false,weight:2.5,opacity:0.01,
      interactive:false
    }).addTo(MAP);
    rippleLayers.push(ring);
    var startTs=null;
    function tick(ts){
      if(!pulseCircle){ring.setStyle({opacity:0});return;}
      if(!startTs) startTs=ts;
      var elapsed=(ts-startTs)%dur;
      var phase=(elapsed-delays[i]+dur)%dur;
      var progress=phase/dur;
      // Expand from small to full radius with ease
      var eased=1-Math.pow(1-progress,2);
      var curR=Math.max(maxR*eased,100);
      var opacity=progress<0.8?0.7*(1-progress/0.8):0;
      ring.setRadius(curR);
      ring.setStyle({opacity:opacity});
      requestAnimationFrame(tick);
    }
    // Stagger start
    setTimeout(function(){ startTs=null; requestAnimationFrame(tick); }, delays[i]);
  });
}
function stopRipples(){
  rippleLayers.forEach(function(l){try{MAP.removeLayer(l);}catch(e){}});
  rippleLayers=[];
}
function stopPulse(){
  if(pulseCircle){MAP.removeLayer(pulseCircle);pulseCircle=null;}
  stopRipples();
}

var acTimers={a:null,b:null};
function setupAutocomplete(inputId,dropId){
  var inp=el(inputId), drop=el(dropId);
  if(!inp||!drop) return;
  var slotKey=inputId.slice(-1); // 'a' or 'b'
  inp.addEventListener('input',function(){
    clearTimeout(acTimers[slotKey]);
    var q=inp.value.trim();
    if(q.length<3){drop.classList.remove('vis');return;}
    acTimers[slotKey]=setTimeout(function(){fetchSuggestions(q,inp,drop);},300);
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Escape'){drop.classList.remove('vis');}
    if(e.key==='ArrowDown'){
      var items=drop.querySelectorAll('.ac-item');
      var sel=drop.querySelector('.ac-item.sel');
      if(sel){sel.classList.remove('sel');var next=sel.nextElementSibling;if(next)next.classList.add('sel');}
      else if(items[0])items[0].classList.add('sel');
      e.preventDefault();
    }
    if(e.key==='ArrowUp'){
      var items=drop.querySelectorAll('.ac-item');
      var sel=drop.querySelector('.ac-item.sel');
      if(sel){sel.classList.remove('sel');var prev=sel.previousElementSibling;if(prev)prev.classList.add('sel');}
      e.preventDefault();
    }
    if(e.key==='Enter'){
      var sel=drop.querySelector('.ac-item.sel');
      if(sel&&drop.classList.contains('vis')){
        inp.value=sel.dataset.addr;
        drop.classList.remove('vis');
        e.stopPropagation();
        run();
      }
    }
  });
  document.addEventListener('click',function(e){
    if(!inp.contains(e.target)&&!drop.contains(e.target))drop.classList.remove('vis');
  });
}

async function fetchSuggestions(query,inp,drop){
  try{
    var r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(query)+'&countrycodes=us&limit=5&addressdetails=1');
    if(!r.ok) return;
    var data=await r.json();
    if(!data.length){drop.classList.remove('vis');return;}
    drop.innerHTML=data.map(function(d){
      var addr=d.address||{};
      var main=[addr.house_number,addr.road].filter(Boolean).join(' ')||d.display_name.split(',')[0];
      var sub=[addr.city||addr.town||addr.village,addr.state].filter(Boolean).join(', ');
      return '<div class="ac-item" data-addr="'+d.display_name.split(',').slice(0,3).join(',').replace(/"/g,'&quot;')+'">'
        +'<div class="ac-item-main">'+main+'</div>'
        +(sub?'<div class="ac-item-sub">'+sub+'</div>':'')
        +'</div>';
    }).join('');
    drop.querySelectorAll('.ac-item').forEach(function(item){
      item.addEventListener('click',function(){
        inp.value=item.dataset.addr;
        drop.classList.remove('vis');
        run();
      });
    });
    drop.classList.add('vis');
  }catch(e){}
}

function hav(lat1,lon1,lat2,lon2){var R=3958.8,p=Math.PI/180,dl=(lat2-lat1)*p,dn=(lon2-lon1)*p;var a=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(lat1*p)*Math.cos(lat2*p)*Math.sin(dn/2)*Math.sin(dn/2);return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function ptSeg(px,py,ax,ay,bx,by){var dx=bx-ax,dy=by-ay;if(!dx&&!dy)return hav(py,px,ay,ax);var t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));return hav(py,px,ay+t*dy,ax+t*dx);}

function drawSlot(slot,lat,lon,r,pop,medInc){
  if(circles[slot]) MAP.removeLayer(circles[slot]);
  if(markers[slot]) MAP.removeLayer(markers[slot]);
  slotCache[slot].lat=lat; slotCache[slot].lon=lon; slotCache[slot].r=r;
  slotCache[slot].pop=pop;
  var fillColor=slot===1?SLOT_COLOR[1]:(medInc&&!compareMode?incColor(medInc):SLOT_COLOR[slot]);
  var strokeColor=slot===1?SLOT_COLOR[1]:'#3ecf8e';
  circles[slot]=L.circle([lat,lon],{radius:r*1609.34,color:strokeColor,fillColor:fillColor,fillOpacity:.07,weight:2,dashArray:'6 4',opacity:.8}).addTo(MAP);
  var icon=L.divIcon({html:'<div style="width:10px;height:10px;background:'+strokeColor+';border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 3px rgba(62,207,142,.4)"></div>',iconSize:[10,10],iconAnchor:[5,5],className:''});
  markers[slot]=L.marker([lat,lon],{icon:icon}).addTo(MAP);
  refreshPopup(slot,medInc);
  var bounds=[];
  for(var i=0;i<2;i++){if(circles[i])bounds.push(circles[i].getBounds());}
  if(bounds.length===1) MAP.fitBounds(bounds[0],{padding:[40,40]});
  else if(bounds.length===2) MAP.fitBounds(bounds[0].extend(bounds[1]),{padding:[40,40]});
}

function refreshPopup(slot,medInc){
  if(!markers[slot]) return;
  var c=slotCache[slot];
  var pop=c.pop, pop10=c.pop10, inc=medInc||c.income, biz=c.biz, hwy=c.hwy;
  if(pop==null) return;
  var color=slot===1?SLOT_COLOR[1]:(inc&&!compareMode?incColor(inc):SLOT_COLOR[slot]);
  var h='<div style="font-family:DM Sans,sans-serif;min-width:160px">';
  h+='<div style="font-family:IBM Plex Mono,monospace;font-size:18px;font-weight:600;letter-spacing:-.5px">'+fmt(pop)+'</div>';
  h+='<div style="font-size:11px;color:#6a768f;margin-bottom:6px">people within '+c.r+'-mile radius</div>';
  if(inc) h+='<div style="font-size:12px;margin-bottom:3px"><span style="color:'+color+'">$'+fmt(inc)+'</span> med. household income</div>';
  if(pop10&&pop10>0){var d=pop-pop10,pct2=(d/pop10*100).toFixed(1),arrow=d>=0?'▲':'▼',col2=d>=0?'#3ecf8e':'#ef5858';h+='<div style="font-size:12px;margin-bottom:3px"><span style="color:'+col2+'">'+arrow+' '+Math.abs(pct2)+'%</span> since 2010 ('+fmt(pop10)+')</div>';}
  if(biz&&biz.total) h+='<div style="font-size:12px;margin-bottom:3px"><span style="color:#f59e42">'+fmt(biz.total)+'</span> employer businesses</div>';
  if(hwy&&hwy.length) h+='<div style="font-size:12px"><span style="color:#f5c842">'+(hwy[0].ref||'HWY')+'</span> '+(hwy[0].dist.toFixed(1))+' mi away</div>';
  h+='</div>';
  markers[slot].bindPopup(h);
  if(markers[slot].isPopupOpen()) markers[slot].openPopup();
}

  var url=window.location.href;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){showToast();});}
  else{var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast();}
}
function showToast(){var t=el('toast');t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

// ═══════════════ PDF EXPORT ═══════════════
function exportPDF(){
  // Un-collapse all cards
  var collapsed = document.querySelectorAll('.hcard.collapsed');
  collapsed.forEach(function(c){ c.classList.remove('collapsed'); });
  // Open sector breakdowns
  [0,1].forEach(function(s){
    var bk=el('bk-'+s); if(bk) bk.classList.add('open');
  });
  el('print-ts').textContent='Generated '+new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})+' · '+radius+'-mile radius';

  // Show Chrome tip overlay
  var tip = document.getElementById('pdf-tip');
  if(!tip){
    tip = document.createElement('div');
    tip.id = 'pdf-tip';
    tip.innerHTML = '<div id="pdf-tip-inner"><div id="pdf-tip-title">Before you print</div>'
      +'<div id="pdf-tip-body">In the Chrome print dialog, enable<br><strong>☑ Background graphics</strong><br>to preserve the dark theme.</div>'
      +'<button onclick="closePdfTip()" id="pdf-tip-btn">Got it — open print dialog</button></div>';
    document.body.appendChild(tip);
    // Add click-outside to close
    tip.addEventListener('click', function(e){ if(e.target===tip) closePdfTip(); });
  } else {
    tip.style.display='flex';
  }
}

function closePdfTip(){
  var tip=document.getElementById('pdf-tip');
  if(tip) tip.style.display='none';
  window.print();
  // Restore collapsed state (user's collapsed cards stay open — feels right for PDF workflow)
}

// ═══════════════ RESET SLOT ═══════════════
function resetSlot(s){
  ['rp','rs','ri','rbiz','rhwy','pop10','pop20','own'].forEach(function(id){
    var e=el(id+'-'+s); if(e){e.textContent='…';e.classList.add('pending');}
  });
  ['biz-ctx-0','biz-ctx-1'].forEach(function(id){var e=el(id);if(e){e.textContent='';e.style.color='';}});
  ['lfpr','unemp','bach','wapop'].forEach(function(id){
    var e=el(id+'-'+s); if(e){e.textContent='…';e.classList.add('pending');}
    // Clear bars
    var bar=el(id+'-'+s+'-bar');
    if(bar){var b=bar.querySelector('.labor-bar');if(b)b.style.width='0%';}
    var elv=el(id+'-'+s);if(elv)elv.className='labor-val pending';
    var note=el(id+'-'+s+'-note');
    if(note) note.innerHTML='';
  });
  ['grow-delta','biz-sub','ictx','ra'].forEach(function(id){
    var e=el(id+'-'+s); if(e) e.textContent='';
  });
  // Clear map layers for this slot
  if(circles[s]){MAP.removeLayer(circles[s]);circles[s]=null;}
  if(markers[s]){MAP.removeLayer(markers[s]);markers[s]=null;}
  if(driveLayer[s]){MAP.removeLayer(driveLayer[s]);driveLayer[s]=null;}
  if(s===0) driveActive=false;
  el('ibar-'+s).style.width='0%';
  el('cbar-'+s).style.display='none';
  var bt=el('breakdown-toggle-'+s); if(bt) bt.style.display='none';
  var bk=el('bk-'+s); if(bk){bk.classList.remove('open');el('breakdown-toggle-'+s).classList.remove('bt-open');}
  // Reset size filter
  bizSizeFilter[s]='all';
  var bsf=el('bsf-'+s);
  if(bsf){bsf.querySelectorAll('.bsf').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-size')==='all');});}
  var bsr=el('biz-size-rows-'+s);if(bsr) bsr.innerHTML='';
  el('sl-'+s).innerHTML='';
  el('hwy-'+s).innerHTML='';
  var airSec=el('air-sec-'+s);if(airSec)airSec.style.display='none';
  var portSec=el('port-sec-'+s);if(portSec)portSec.style.display='none';
  var hwyEl=el('rhwy-'+s);if(hwyEl){hwyEl.textContent='…';hwyEl.classList.add('pending');}
}

// ═══════════════ API: GEOCODE ═══════════════
async function geocode(addr){
  var r=await fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(addr)+'&countrycodes=us&limit=1&addressdetails=1');
  if(!r.ok) throw new Error('Geocoding failed');
  var d=await r.json();
  if(!d||!d.length) throw new Error('Address not found — try adding city and state');
  return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),display:d[0].display_name,rawData:d};
}

// ═══════════════ API: BLOCK GROUPS ═══════════════
async function fetchBGs(lat,lon,r){
  var geom='{"x":'+lon+',"y":'+lat+'}';
  var res=await fetch('https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/Tracts_Blocks/MapServer/11/query'
    +'?geometry='+encodeURIComponent(geom)+'&geometryType=esriGeometryPoint&spatialRel=esriSpatialRelIntersects'
    +'&distance='+(r+0.5)+'&units=esriSRUnit_StatuteMile&inSR=4326'
    +'&outFields=GEOID,CENTLAT,CENTLON,POP100,HU100&returnGeometry=false&f=json');
  if(!res.ok) throw new Error('Census API error');
  var d=await res.json();
  if(d.error) throw new Error('Census: '+d.error.message);
  if(!d.features||!d.features.length) throw new Error('No census data — US addresses only');
  return d.features.map(function(f){return f.attributes;}).filter(function(bg){
    return bg.CENTLAT&&bg.CENTLON&&hav(lat,lon,parseFloat(bg.CENTLAT),parseFloat(bg.CENTLON))<=r;
  });
}

// ═══════════════ API: INCOME + LABOR POOL ═══════════════
async function fetchIncomeLabor(bgs){
  var counties={};
  bgs.forEach(function(bg){
    var st=bg.GEOID.slice(0,2),co=bg.GEOID.slice(2,5),k=st+'-'+co;
    if(!counties[k]) counties[k]={state:st,county:co,geoids:{}};
    counties[k].geoids[bg.GEOID]=true;
  });
  var incWt=0,incPop=0,lf=0,pop16=0,unemp=0,bach=0,pop25=0,hmvWt=0,hmvPop=0;
  for(var k in counties){
    var c=counties[k];
    try{
      var url='https://api.census.gov/data/2022/acs/acs5?get=B19013_001E,B01003_001E,B23025_001E,B23025_002E,B23025_005E,B15003_001E,B15003_022E,B15003_023E,B15003_024E,B15003_025E,B25077_001E&for=block%20group:*&in=state:'+c.state+'%20county:'+c.county+'%20tract:*';
      var r=await fetch(url); if(!r.ok) continue;
      var rows=await r.json();
      for(var i=1;i<rows.length;i++){
        var row=rows[i],geoid=row[11]+row[12]+row[13]+row[14];
        if(c.geoids[geoid]){
          var inc=parseInt(row[0])||0,pop=parseInt(row[1])||0;
          if(inc>0&&pop>0){incWt+=inc*pop;incPop+=pop;}
          var p16=parseInt(row[2])||0,lfv=parseInt(row[3])||0,un=parseInt(row[4])||0;
          var p25=parseInt(row[5])||0,bv=(parseInt(row[7])||0)+(parseInt(row[8])||0)+(parseInt(row[9])||0);
          var hmv=parseInt(row[10])||0;
          lf+=lfv;pop16+=p16;unemp+=un;bach+=bv;pop25+=p25;
          if(hmv>0&&pop>0){hmvWt+=hmv*pop;hmvPop+=pop;}
        }
      }
    }catch(e){}
  }
  return{
    income:incPop>0?Math.round(incWt/incPop):null,
    lfpr:pop16>0?lf/pop16:null,
    unempRate:lf>0?unemp/lf:null,
    bachRate:pop25>0?bach/pop25:null,
    homeValue:hmvPop>0?Math.round(hmvWt/hmvPop):null,
    workingAgePop:pop16
  };
}


// Separate fetch for housing tenure (B25003) — isolated so failures don't affect income/labor
async function fetchTenure(bgs){
  var counties={};
  bgs.forEach(function(bg){
    var st=bg.GEOID.slice(0,2),co=bg.GEOID.slice(2,5),k=st+'-'+co;
    if(!counties[k]) counties[k]={state:st,county:co,geoids:{}};
    counties[k].geoids[bg.GEOID]=true;
  });
  var ownHH=0,totHH=0;
  for(var k in counties){
    var c=counties[k];
    try{
      var url='https://api.census.gov/data/2022/acs/acs5?get=B25003_001E,B25003_002E,B25003_003E&for=block%20group:*&in=state:'+c.state+'%20county:'+c.county+'%20tract:*';
      var r=await fetch(url); if(!r.ok) continue;
      var rows=await r.json();
      for(var i=1;i<rows.length;i++){
        var row=rows[i],geoid=row[3]+row[4]+row[5]+row[6];
        if(c.geoids[geoid]){
          var th=parseInt(row[0])||0,oh=parseInt(row[1])||0;
          totHH+=th; ownHH+=oh;
        }
      }
    }catch(e){}
  }
  return totHH>0?ownHH/totHH:null;
}

// ═══════════════ API: 2010 POPULATION ═══════════════
async function fetch2010(bgs){
  var counties={};
  bgs.forEach(function(bg){
    var st=bg.GEOID.slice(0,2),co=bg.GEOID.slice(2,5),k=st+'-'+co;
    if(!counties[k]) counties[k]={state:st,county:co,geoids:{}};
    counties[k].geoids[bg.GEOID]=true;
  });
  var total=0,matched=0;
  for(var k in counties){
    var c=counties[k];
    try{
      var url='https://api.census.gov/data/2010/dec/sf1?get=P001001&for=block%20group:*&in=state:'+c.state+'%20county:'+c.county+'%20tract:*';
      var r=await fetch(url); if(!r.ok) continue;
      var rows=await r.json();
      for(var i=1;i<rows.length;i++){
        var row=rows[i],geoid=row[1]+row[2]+row[3]+row[4];
        if(c.geoids[geoid]){total+=parseInt(row[0])||0;matched++;}
      }
    }catch(e){}
  }
  return{pop:total,matched:matched};
}

// ═══════════════ API: STATE DENSITY ═══════════════
async function fetchState(fips){
  var land=STATE_LAND[fips]; if(!land) return null;
  try{
    var [popResp,bizResp,hhiResp,laborResp]=await Promise.all([
      fetch('https://api.census.gov/data/2022/acs/acs5?get=B01003_001E,NAME&for=state:'+fips),
      fetch('https://api.census.gov/data/2021/cbp?get=ESTAB&for=state:'+fips+'&NAICS2017=00'),
      fetch('https://api.census.gov/data/2022/acs/acs5?get=B19013_001E&for=state:'+fips),
      fetch('https://api.census.gov/data/2022/acs/acs5?get=B23025_001E,B23025_002E,B23025_005E,B15003_001E,B15003_022E,B15003_023E,B15003_024E,B15003_025E,B25003_001E,B25003_002E&for=state:'+fips)
    ]);
    if(!popResp.ok) return null;
    var popD=await popResp.json();
    var pop=parseInt(popD[1][0]);
    var stateBiz=null;
    if(bizResp.ok){
      var bizD=await bizResp.json();
      var estab=parseInt(bizD[1][0]);
      stateBiz={estab:estab,perSqMi:estab/land};
    }
    // Fetch EMPSZES size breakdown for state
    var stateBizSizes=null;
    try{
      var szResp=await fetch('https://api.census.gov/data/2021/cbp?get=ESTAB,EMPSZES&for=state:'+fips+'&NAICS2017=00');
      if(szResp.ok){
        var szD=await szResp.json();
        var szMap={};
        szD.slice(1).forEach(function(r){szMap[r[1]]=parseInt(r[0])||0;});
        var szLand=STATE_LAND[fips]||1;
        stateBizSizes={
          all:szMap['001']||0,
          e10:(szMap['230']||0)+(szMap['241']||0)+(szMap['242']||0)+(szMap['251']||0)+(szMap['252']||0)+(szMap['254']||0),
          e50:(szMap['242']||0)+(szMap['251']||0)+(szMap['252']||0)+(szMap['254']||0),
          e100:(szMap['251']||0)+(szMap['252']||0)+(szMap['254']||0),
          perSqMi:{
            all:(szMap['001']||0)/szLand,
            e10:((szMap['230']||0)+(szMap['241']||0)+(szMap['242']||0)+(szMap['251']||0)+(szMap['252']||0)+(szMap['254']||0))/szLand,
            e50:((szMap['242']||0)+(szMap['251']||0)+(szMap['252']||0)+(szMap['254']||0))/szLand,
            e100:((szMap['251']||0)+(szMap['252']||0)+(szMap['254']||0))/szLand
          }
        };
      }
    }catch(e){}
    var stateHHI=null;
    if(hhiResp.ok){
      var hhiD=await hhiResp.json();
      stateHHI=parseInt(hhiD[1][0]);
    }
    var stateLabor=null;
    if(laborResp.ok){
      var labD=await laborResp.json();
      var r2=labD[1];
      var sp16=parseInt(r2[0]),slf=parseInt(r2[1]),sun=parseInt(r2[2]);
      var sp25=parseInt(r2[3]),sbch=parseInt(r2[4])+parseInt(r2[5])+parseInt(r2[6])+parseInt(r2[7]);
      var stotHH=parseInt(r2[8])||0,sownHH=parseInt(r2[9])||0;
      var stateLand=STATE_LAND[fips]||1;
      stateLabor={lfpr:sp16>0?slf/sp16:null,unempRate:slf>0?sun/slf:null,bachRate:sp25>0?sbch/sp25:null,pop16PerSqMi:sp16/stateLand,ownerRate:stotHH>0?sownHH/stotHH:null};
    }
    return{density:pop/land,name:popD[1][1],pop:pop,biz:stateBiz,bizSizes:stateBizSizes,hhi:stateHHI,labor:stateLabor};
  }catch(e){return null;}
}


// ═══════════════ API: BUSINESSES ═══════════════
async function fetchBiz(lat,lon,r){
  var geom='{"x":'+lon+',"y":'+lat+'}';
  var zr=await fetch('https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/PUMA_TAD_TAZ_UGA_ZCTA/MapServer/4/query'
    +'?geometry='+encodeURIComponent(geom)+'&geometryType=esriGeometryPoint&distance='+(r+0.5)+'&units=esriSRUnit_StatuteMile&inSR=4326'
    +'&outFields=ZCTA5,CENTLAT,CENTLON&returnGeometry=false&f=json');
  if(!zr.ok) return null;
  var zd=await zr.json();
  if(!zd.features||!zd.features.length) return null;
  var zips=zd.features.map(function(f){return f.attributes;}).filter(function(z){
    return z.CENTLAT&&z.CENTLON&&hav(lat,lon,parseFloat(z.CENTLAT),parseFloat(z.CENTLON))<=r;
  });
  if(!zips.length) return null;
  var total=0,sectors={};
  var szCodes={'210':0,'220':0,'230':0,'241':0,'242':0,'251':0,'252':0,'254':0};
  await Promise.all(zips.map(async function(z){
    try{
      // Fetch both sector and size class data in parallel
      var [br,sr]=await Promise.all([
        fetch('https://api.census.gov/data/2018/zbp?get=ESTAB,NAICS2017&for=zipcode:'+z.ZCTA5),
        fetch('https://api.census.gov/data/2018/zbp?get=ESTAB,EMPSZES&for=zipcode:'+z.ZCTA5+'&NAICS2017=00')
      ]);
      if(br.ok){
        var rows=await br.json();
        for(var m=1;m<rows.length;m++){
          var code=rows[m][1],est=parseInt(rows[m][0])||0;
          if(code==='00') total+=est;
          else if(code.length===2) sectors[code]=(sectors[code]||0)+est;
        }
      }
      if(sr.ok){
        var srows=await sr.json();
        for(var n=1;n<srows.length;n++){
          var sc=srows[n][1],se=parseInt(srows[n][0])||0;
          if(szCodes.hasOwnProperty(sc)) szCodes[sc]+=se;
        }
      }
    }catch(e){}
  }));
  // Compute size tier totals
  var e10=(szCodes['230'])+(szCodes['241'])+(szCodes['242'])+(szCodes['251'])+(szCodes['252'])+(szCodes['254']);
  var e50=(szCodes['242'])+(szCodes['251'])+(szCodes['252'])+(szCodes['254']);
  var e100=(szCodes['251'])+(szCodes['252'])+(szCodes['254']);
  return{total:total,zips:zips.length,sectors:sectors,sizes:{all:total,e10:e10,e50:e50,e100:e100}};
}

// ═══════════════ API: INTERSTATES ═══════════════
async function fetchHwy(lat,lon){
  for(var ri=0;ri<2;ri++){
    var m=ri===0?24140:48280;
    // Query 1: interstates + trunks
    var q1='[out:json][timeout:20];(way["highway"="motorway"](around:'+m+','+lat+','+lon+');way["highway"="trunk"](around:'+m+','+lat+','+lon+'););out geom;';
    // Query 2: state routes (primary with ref number)
    var q2='[out:json][timeout:20];way["highway"="primary"]["ref"](around:'+(m*0.6)+','+lat+','+lon+');out geom;';
    try{
      var _ctrl=new AbortController();
      var _tid=setTimeout((function(c){return function(){c.abort();};}(_ctrl)),25000);
      var [r1,r2]=await Promise.all([
        fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q1),{signal:_ctrl.signal}),
        fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q2),{signal:_ctrl.signal})
      ]);
      clearTimeout(_tid);
      var elems=[];
      if(r1.ok){var d1=await r1.json();if(d1.elements)elems=elems.concat(d1.elements);}
      if(r2.ok){var d2=await r2.json();if(d2.elements)elems=elems.concat(d2.elements);}
      var d={elements:elems};
      if(!d.elements||!d.elements.length) continue;
      var best={};
      d.elements.forEach(function(el){
        var g=el.geometry||[],tags=el.tags||{},ref=tags.ref||'',name=tags.name||'';
        if(!ref&&!name) return;
        var key=ref||name;
        for(var j=0;j<g.length-1;j++){
          var dist=ptSeg(lon,lat,g[j].lon,g[j].lat,g[j+1].lon,g[j+1].lat);
          if(!best[key]||dist<best[key].dist) best[key]={dist:dist,ref:ref,name:name};
        }
      });
      var ranked=Object.values(best).sort(function(a,b){return a.dist-b.dist;}).slice(0,4);
      if(ranked.length) return {hwys:ranked, elements:d.elements};
    }catch(e){continue;}
  }
  return null;
}

// ═══════════════ EXITS ═══════════════
var exitMapLayer=null;
var exitElementsAll=[];

async function fetchExits(lat,lon,radiusMiles){
  var m=Math.round(radiusMiles*1609.34);
  var q='[out:json][timeout:20];node["highway"="motorway_junction"](around:'+m+','+lat+','+lon+');out body;';
  try{
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort();},22000);
    var r=await fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(q),{signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok) return null;
    var d=await r.json();
    return d.elements&&d.elements.length?d.elements:null;
  }catch(e){return null;}
}

function drawExits(exitElements, hwyElements, centerLat, centerLon){
  clearExits();
  if(!exitElements||!exitElements.length) return;
  exitMapLayer=L.layerGroup().addTo(MAP);

  // Group exits by highway ref — use OSM node tags directly (no way matching needed)
  // Junction nodes often have a 'highway_1:ref' or nearby way ref in their tags
  // Fallback: just cluster by distance and show all with their exit ref
  var seen={}; // dedup by exitRef to avoid showing same exit twice

  exitElements.forEach(function(node){
    if(!node.lat||!node.lon) return;
    var tags=node.tags||{};
    var exitNum=tags.ref||tags['ref:exit']||tags.name||'';
    if(!exitNum) return;

    // Get highway ref from node tags if available
    var hwyRef=tags['highway:ref']||tags['destination:ref']||
               tags['highway']||'';
    var destName=tags.destination||tags['destination:street']||
                 tags['destination:ref']||'';

    var distMi=hav(centerLat,centerLon,node.lat,node.lon);
    var key=exitNum+'|'+Math.round(node.lat*1000)+'|'+Math.round(node.lon*1000);
    if(seen[key]) return;
    seen[key]=true;

    // Match to nearest highway way for the highway name
    var closestRef='';
    var closestDist=999;
    if(hwyElements&&hwyElements.length){
      hwyElements.forEach(function(way){
        if(!way.geometry||!way.geometry.length) return;
        var wt=way.tags||{};
        if(wt.highway!=='motorway'&&wt.highway!=='trunk') return;
        var wRef=wt.ref||wt.name||'';
        if(!wRef) return;
        for(var j=0;j<way.geometry.length-1;j++){
          var dd=ptSeg(node.lon,node.lat,
            way.geometry[j].lon,way.geometry[j].lat,
            way.geometry[j+1].lon,way.geometry[j+1].lat);
          if(dd<closestDist){closestDist=dd;closestRef=wRef;}
        }
      });
    }
    // Use matched highway ref or fallback
    if(closestDist>1.5&&!hwyRef) return; // skip if can't associate with a highway
    var finalRef=closestRef||hwyRef||'HWY';

    // Build popup content
    var dist=distMi.toFixed(1);
    var popupHtml=
      '<div style="font-family:'DM Sans',sans-serif;min-width:140px">'+
      '<div style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:#4b7cf3;margin-bottom:2px">Exit '+exitNum+'</div>'+
      '<div style="font-size:12px;font-weight:600;color:#dde3f0;margin-bottom:4px">'+finalRef+'</div>'+
      (destName?'<div style="font-size:11px;color:#8e98b0;margin-bottom:4px">'+destName+'</div>':'')+
      '<div style="font-size:11px;color:#636d85">'+dist+' mi from center</div>'+
      '</div>';

    // Marker: shows highway ref + exit number
    var markerHtml=
      '<div class="exit-marker">'+
      '<span class="exit-hwy">'+finalRef.replace('Interstate ','I-').replace('US ','US-').replace('Massachusetts Route ','MA-').replace('Route ','Rte ')+'</span>'+
      '<span class="exit-num-badge">'+exitNum+'</span>'+
      '</div>';

    var icon=L.divIcon({
      className:'',
      html:markerHtml,
      iconSize:[56,24],
      iconAnchor:[28,12]
    });

    L.marker([node.lat,node.lon],{icon:icon,interactive:true,zIndexOffset:300})
      .bindPopup(popupHtml,{maxWidth:200,className:'exit-popup'})
      .addTo(exitMapLayer);
  });
}

function clearExits(){

function renderIncome(s,income,lfpr,unempRate,bachRate,homeValue,waPop,hu,stateDataArg){
  if(income){
    var c=incColor(income);
    animateNumber(el('ri-'+s), '$'+fmt(income), 80);
    var ibarEl=el('ibar-'+s);
    if(ibarEl){
      ibarEl.style.background=c;
      ibarEl.style.width='0%';
      setTimeout(function(){ibarEl.style.width=Math.min(Math.max((income-30000)/170000*100,2),100)+'%';},150);
    }
    var incCtx=incLabel(income);
    // Add state HHI comparison if available
    var stData=stateDataArg||slotCache[s].stateData;
    if(stData&&stData.hhi&&income){
      var hRatio=income/stData.hhi;
      var hMult=hRatio>=1?hRatio.toFixed(1)+'×':((hRatio*100).toFixed(0)+'%');
      var hColor=hRatio>=1.25?'var(--gn)':hRatio>=1.05?'var(--ac)':hRatio>=0.9?'var(--yw)':'var(--rd)';
      el('ictx-'+s).innerHTML=incCtx+' · <span style="color:'+hColor+'">'+hMult+'</span><span style="color:var(--m1)"> '+stData.name+' avg ($'+Math.round(stData.hhi/1000)+'K)</span>';
    } else {
      el('ictx-'+s).textContent=incCtx;
    }
  } else {
    el('ri-'+s).textContent='N/A'; el('ri-'+s).classList.remove('pending');
  }
  var stLab=stateDataArg&&stateDataArg.labor;
  var stName=stateDataArg?stateDataArg.name:'state';

  function mkComp(val,stateVal,higherIsBetter){
    if(!stateVal||!val) return '';
    var ratio=val/stateVal;
    var mult=ratio>=1?ratio.toFixed(2)+'×':(ratio*100).toFixed(0)+'%';
    // For unemployment, lower is better
    var good=higherIsBetter?(ratio>=1.05):(ratio<=0.95);
    var bad=higherIsBetter?(ratio<0.9):(ratio>1.1);
    var color=good?'var(--gn)':bad?'var(--yw)':'var(--m2)';
    return ' <span style="font-size:10px;color:'+color+'">'+mult+' '+stName+' avg</span>';
  }

  // ─ Labor values + inline bars ─
  function setLabor(id, val, stateVal, higherGood, fmt2) {
    var el2=el(id+'-'+s), barTrack=el(id+'-'+s+'-bar'), noteEl=el(id+'-'+s+'-note');
    if(!el2) return;
    if(val!=null){
      el2.textContent=fmt2(val); el2.classList.remove('pending');
      if(stateVal){
        var ratio=val/stateVal;
        var isGood=higherGood?(ratio>=1.05):(ratio<=0.95);
        var isBad=higherGood?(ratio<0.9):(ratio>1.1);
        el2.className='labor-val'+(isGood?' positive':isBad?' caution':'');
        if(barTrack){
          var w=Math.min(Math.max(ratio*50,2),96);
          var barColor=isGood?'var(--gn)':isBad?'var(--yw)':'var(--ac)';
          var bar=barTrack.querySelector('.labor-bar');
          if(bar){bar.style.background=barColor;setTimeout(function(){bar.style.width=w+'%';},200);}
        }
        if(noteEl){
          var mult=ratio>=1?ratio.toFixed(1)+'×':((ratio*100).toFixed(0)+'%');
          var mCol=isGood?'var(--gn)':isBad?'var(--yw)':'var(--m1)';
          noteEl.innerHTML='<span style="color:'+mCol+';font-weight:600">'+mult+'</span>'
            +' <span style="color:var(--m1)">vs '+stName+' '+fmt2(stateVal)+'</span>';
        }
      }
    } else {
      el2.textContent='N/A'; el2.classList.remove('pending');
      el2.className='labor-val';
    }
  }

  setLabor('lfpr', lfpr!=null?lfpr*100:null, stLab?stLab.lfpr*100:null, true, function(v){return v.toFixed(1)+'%';});
  setLabor('unemp', unempRate!=null?unempRate*100:null, stLab?stLab.unempRate*100:null, false, function(v){return v.toFixed(1)+'%';});
  setLabor('bach', bachRate!=null?bachRate*100:null, stLab?stLab.bachRate*100:null, true, function(v){return v.toFixed(1)+'%';});
  // Working-age population (16+)
  if(waPop>0){
    var waEl=el('wapop-'+s);
    if(waEl){waEl.textContent=fmt(waPop);waEl.classList.remove('pending');}
    if(stLab&&stLab.pop16PerSqMi&&slotCache[s].area){
      var area2=slotCache[s].area;
      var stateWa=Math.round(stLab.pop16PerSqMi*area2);
      if(stateWa>0){
        var waBar=el('wapop-'+s+'-bar'), waNoteEl=el('wapop-'+s+'-note');
        if(waBar){
          var waRatio=waPop/stateWa;
          var waBar2=waBar.querySelector('.labor-bar');
          if(waBar2){
            waBar2.style.background=waRatio>=1.05?'var(--gn)':waRatio<0.9?'var(--yw)':'var(--ac)';
            setTimeout(function(){waBar2.style.width=Math.min((waRatio)*50,96)+'%';},200);
          }
        }
        if(waNoteEl){
          var waM=waRatio>=1?waRatio.toFixed(1)+'×':((waRatio*100).toFixed(0)+'%');
          var waC=waRatio>=1.05?'var(--gn)':waRatio<0.9?'var(--yw)':'var(--m1)';
          waNoteEl.innerHTML='<span style="color:'+waC+';font-weight:600">'+waM+'</span>'
            +' <span style="color:var(--m1)">vs '+stName+' '+fmt(stateWa)+'</span>';
          var waEl2=el('wapop-'+s);
          if(waEl2){waEl2.className='labor-val'+(waRatio>=1.05?' positive':waRatio<0.9?' caution':'');}
        }
      }
    }
  } else{var waN=el('wapop-'+s);if(waN){waN.textContent='N/A';waN.classList.remove('pending');}}
  // Median home value
  if(homeValue&&homeValue>0){el('hmv-'+s).textContent='$'+Math.round(homeValue/1000)+'K';slotCache[s].hmv=homeValue;}
  else{el('hmv-'+s).textContent='N/A';}
}

var bizSizeFilter=['all','all'];

function setBizFilter(s,size){
  bizSizeFilter[s]=size;

function renderBizSizes(s,biz,stateData){
  if(!biz||!biz.sizes) return;
  var sz=biz.sizes;
  var filter=bizSizeFilter[s]||'all';
  var area=slotCache[s].area||Math.PI*radius*radius;

  // Headline number = active filter count
  var count=filter==='all'?sz.all:filter==='10'?sz.e10:filter==='50'?sz.e50:sz.e100;
  animateNumber(el('rbiz-'+s), fmt(count), 120);

  var tiers=[
    {key:'all', keyState:'all',  label:'1+ employees',   val:sz.all},
    {key:'10',  keyState:'e10',  label:'10+ employees',  val:sz.e10},
    {key:'50',  keyState:'e50',  label:'50+ employees',  val:sz.e50},
    {key:'100', keyState:'e100', label:'100+ employees', val:sz.e100},
  ];

  var szState=stateData&&stateData.bizSizes;
  var stShort=stateData?(stateData.name||'state').replace('Commonwealth of ','').replace(' of America',''):'state';

  var rows=tiers.map(function(t){
    var isActive=filter===t.key;
    var stateExp=szState?Math.round(szState.perSqMi[t.keyState]*area):null;
    var ratio=(stateExp&&stateExp>0)?t.val/stateExp:null;

    var multHtml='';
    var avgHtml='';
    if(ratio!==null){
      var mult=ratio>=1?ratio.toFixed(1)+'×':((ratio*100).toFixed(0)+'%');
      var cls=ratio>=1.5?'gn':ratio>=1.1?'ac':ratio>=0.75?'yw':'rd';
      multHtml='<span class="biz-size-mult '+cls+'">'+mult+'</span>';
      avgHtml='<span class="biz-size-avg">'+stShort+' avg '+fmt(stateExp)+'</span>';
    }

    return '<div class="biz-size-row '+(isActive?'active':'inactive')+'">'
      +'<div class="biz-size-left">'
      +'<span class="biz-size-label">'+t.label+'</span>'
      +'</div>'
      +'<div class="biz-size-right">'
      +avgHtml
      +multHtml
      +'<span class="biz-size-val'+(isActive?' active-val':'')+'">'+fmt(t.val)+'</span>'
      +'</div>'
      +'</div>';
  });

  var rowsEl=el('biz-size-rows-'+s);
  if(rowsEl) rowsEl.innerHTML=rows.join('');

  // Subtitle + clear old ctx
  el('biz-sub-'+s).textContent=biz.zips+' ZIP codes · ZBP 2018';
  var bizCtxEl=el('biz-ctx-'+s);
  if(bizCtxEl) bizCtxEl.innerHTML='';
}

function renderBiz(s,biz,stateData){
  if(biz&&biz.total>0){
    // Cache for filter switching
    slotCache[s].biz=biz;
    // Show size filters immediately
    var bsf=el('bsf-'+s);
    if(bsf) bsf.style.display='flex';
    // Render size breakdown - defer slightly to let DOM settle
    renderBizSizes(s,biz,stateData);
    setTimeout(function(){ renderBizSizes(s,slotCache[s].biz,slotCache[s].stateData); }, 50);
    // Sector breakdown
    if(biz.sectors){
      var merged={};
      for(var code in biz.sectors){var k=NAICS_MERGE[code]||code;merged[k]=(merged[k]||0)+biz.sectors[code];}
      var sorted=Object.keys(merged).map(function(k){return{code:k,count:merged[k],label:NAICS_LABEL[k]||('NAICS '+k)};});
      sorted.sort(function(a,b){return b.count-a.count;});
      var top=sorted.slice(0,10),maxV=top[0]?top[0].count:1;
      el('sl-'+s).innerHTML=top.map(function(row,idx){
        return '<div class="s-row"><div class="s-name" title="'+row.label+'">'+row.label+'</div>'
          +'<div class="s-bar-wrap"><div class="s-bar" id="sbar-'+s+'-'+idx+'" style="width:0%"></div></div>'
          +'<div class="s-ct">'+row.count+'</div></div>';
      }).join('');
      // Animate bars in with stagger
      top.forEach(function(row,idx){
        var tgt=Math.round(row.count/maxV*100);
        setTimeout(function(){
          var b=document.getElementById('sbar-'+s+'-'+idx);
          if(b) b.style.width=tgt+'%';
        }, 80 + idx*40);
      });
      el('breakdown-toggle-'+s).style.display='flex';
      el('bk-'+s).classList.add('open');
      el('breakdown-toggle-'+s).classList.add('bt-open');
    }
  } else {
    el('rbiz-'+s).textContent='N/A'; el('rbiz-'+s).classList.remove('pending');
  }
}



// ── PROGRESS STEPS ──
function setStep(step){
  ['geo','census','income','transport'].forEach(function(s){
    var el2=document.getElementById('ps-'+s);
    if(!el2) return;
    el2.classList.remove('active','done');
  });
  var steps=['geo','census','income','transport'];
  var idx=steps.indexOf(step);
  steps.forEach(function(s,i){
    var el2=document.getElementById('ps-'+s);
    if(!el2) return;
    if(i<idx) el2.classList.add('done');
    else if(i===idx) el2.classList.add('active');
  });
  document.getElementById('progress').classList.add('vis');
}
function clearSteps(){
  document.getElementById('progress').classList.remove('vis');
  ['geo','census','income','transport'].forEach(function(s){
    var el2=document.getElementById('ps-'+s);
    if(el2) el2.classList.remove('active','done');
  });
}

function confirmSave(){

    id:Date.now(),

function renderSaves(filter){
  var saves=getSaves();
  var panel=el('saves-panel');
  var list=el('saves-list');
  if(!saves.length){panel.classList.remove('vis');return;}
  panel.classList.add('vis');
  var filtered=filter?saves.filter(function(s){
    var q=filter.toLowerCase();
    return s.name.toLowerCase().indexOf(q)>=0||(s.address&&s.address.toLowerCase().indexOf(q)>=0);
  }):saves;
  if(!filtered.length){
    list.innerHTML='<div style="font-size:11px;color:var(--m1);padding:8px 4px">No matches</div>';
    return;
  }
  list.innerHTML=filtered.map(function(s){
    var initials=(function(name){
      var words=name.split(' ').filter(function(w){return w&&isNaN(w[0]);});
      if(!words.length) return name.slice(0,2).toUpperCase();
      return words.slice(0,2).map(function(w){return w[0];}).join('').toUpperCase();
    })(s.name);
    var pop=s.pop?Math.round(s.pop/1000)+'K':'';
    var inc=s.income?'$'+Math.round(s.income/1000)+'K':'';
    return '<div class="save-item" onclick="loadSave('+s.id+')">'
      +'<div class="save-item-icon">'+initials+'</div>'
      +'<div class="save-item-left">'
      +'<div class="save-name-label">'+s.name+'</div>'
      +'<div class="save-meta">'+s.radius+' mi · '+s.savedAt+'</div>'
      +'</div>'
      +'<div class="save-item-right">'
      +(pop?'<span class="save-stat-pill">'+pop+'</span>':'')
      +(inc?'<span class="save-stat-inc">'+inc+'</span>':'')
      +'</div>'
      +'<button class="save-del" onclick="event.stopPropagation();deleteSave('+s.id+')" title="Delete">×</button>'
      +'</div>';
  }).join('');
}

function copyLatestSummary(){

    if(!btn) return;
    btn.textContent='✓ Copied';btn.classList.add('copied');

}

function openSummary(){el('summary-modal').classList.add('vis');}
function closeSummary(){el('summary-modal').classList.remove('vis');}

function smAppendMsg(role,text,isThinking){
  var msgs=el('summary-msgs');
  var isAI=role==='assistant';

  var wrap=document.createElement('div');
  wrap.className='sm-msg'+(isAI?' ai-msg':' user');

  // avatar hidden via CSS but still appended for structure
  var avatar=document.createElement('div');
  avatar.className='sm-avatar '+(isAI?'ai':'usr');
  avatar.textContent=isAI?'C':'You';
  wrap.appendChild(avatar);

  var bubble=document.createElement('div');
  if(isThinking){
    bubble.className='sm-bubble thinking';
    bubble.innerHTML='<div class="sm-thinking-dots"><span></span><span></span><span></span></div><span>Generating…</span>';
  } else if(isAI){
    bubble.className='sm-bubble ai';
    bubble.textContent=text;
  } else {
    bubble.className='sm-bubble';
    bubble.textContent=text;
  }
  wrap.appendChild(bubble);

  if(isAI&&!isThinking) smAddCopy(wrap,bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
  return bubble;
}


function smAddCopy(wrap,bubble){
  var aw=document.createElement('div');aw.className='sm-actions';
  var cb=document.createElement('button');cb.className='sm-act-btn';cb.textContent='Copy';
  cb.onclick=function(){
    navigator.clipboard.writeText(bubble.textContent).then(function(){
      cb.textContent='✓ Copied';cb.classList.add('copied');
      setTimeout(function(){cb.textContent='Copy';cb.classList.remove('copied');},2000);
    });
  };
  aw.appendChild(cb);wrap.appendChild(aw);
}

function smUpdateLast(text){
  var msgs=el('summary-msgs');

  bubble.className='sm-bubble ai';

}

function addSuggestions(isFirst){
  var msgs=el('summary-msgs');

async function sendSummaryMsg(isInitial){
  if(summaryGenerating) return;
  var input=el('summary-chat-input');
  var text=input?input.value.trim():'';
  if(!text&&!isInitial) return;
  summaryGenerating=true;
  el('summary-send').disabled=true;

  if(text){
    smAppendMsg('user',text,false);
    summaryConversation.push({role:'user',content:text});
    input.value='';input.style.height='auto';
  }

  // Show thinking with appropriate label
  var thinkLabel=brokerType?'Searching market data…':'Generating…';
  var thinkBubble=smAppendMsg('assistant','',true);
  if(thinkBubble) thinkBubble.innerHTML='<div class="sm-thinking-dots"><span></span><span></span><span></span></div><span>'+thinkLabel+'</span>';

  var key=getApiKey();
  if(!key){
    smUpdateLast('No API key set. Click “Add API Key” in the sidebar to enable this feature.');
    summaryGenerating=false;
    el('summary-send').disabled=false;
    return;
  }

  var msgs=summaryConversation.length>0?summaryConversation:[{role:'user',content:'Generate the initial market summary.'}];
  var aiText='';
  var errMsg='';

  try{
    var timeoutMs=brokerType?90000:35000;
    var ctrl=new AbortController();
    var tid=setTimeout(function(){ctrl.abort();},timeoutMs);
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',signal:ctrl.signal,
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:(function(){
        var body={model:'claude-sonnet-4-20250514',max_tokens:1200,system:summaryDataCtx,messages:msgs};
        if(brokerType) body.tools=[{type:'web_search_20250305',name:'web_search'}];
        return JSON.stringify(body);
      })()
    });
    clearTimeout(tid);
    if(resp.ok){
      var d2=await resp.json();
      (d2.content||[]).forEach(function(b){if(b.type==='text')aiText+=b.text;});
      if(!aiText&&d2.stop_reason==='tool_use'){
        errMsg='Web search is running but response was not returned. Try again.';
      }
    } else {
      var errBody=await resp.text();
      errMsg='API error '+resp.status+(errBody?': '+errBody.slice(0,120):'');
    }
  }catch(e){
    errMsg=e.name==='AbortError'?'Request timed out — try again (web searches take ~60s)':String(e).slice(0,100);
  }

  if(errMsg&&!aiText){
    smUpdateLast('⚠️ '+errMsg);
    summaryGenerating=false;
    el('summary-send').disabled=false;
    return;
  }

  if(!aiText||aiText.length<80){
    // Only fall back to template for non-broker requests
    if(!brokerType){
      var d=buildDataPayload();
      aiText=buildFallbackSummary(d,summaryConversation.filter(function(m){return m.role==='user';}).map(function(m){return m.content;}).join(' '));
    } else {
      aiText='Could not retrieve market data for this request. Check your API key and try again.';
    }
  }

  aiText=aiText.trim();
  smUpdateLast(aiText);
  summaryConversation.push({role:'assistant',content:aiText});
  addSuggestions(summaryConversation.filter(function(m){return m.role==='user';}).length<=1);
  summaryGenerating=false;
  el('summary-send').disabled=false;
}

function buildFallbackSummary(d,instructions){
  instructions=instructions||'';
  var city=d.address?d.address.split(',')[0]:'The subject market';
  var income=slotCache[0].income||0;
  var incTier=income>=120000?'exceptional':income>=90000?'strong':income>=65000?'solid':'moderate';
  var growSign=d.growthNote&&d.growthNote.indexOf('▲')>=0?'growth':d.growthNote&&d.growthNote.indexOf('▼')>=0?'contraction':'stability';
  var lfprNum=parseFloat(d.lfpr)||0;
  var unempNum=parseFloat(d.unemployment)||0;
  var bachNum=parseFloat(d.bachelorsPlus)||0;
  var laborQual=lfprNum>=0.68?'deep and actively engaged':lfprNum>=0.62?'well-engaged':'moderately active';
  var unempCtx=unempNum<=4?'unemployment well below the national average':unempNum<=6?'unemployment consistent with near-full employment':'an unemployment rate reflecting broader regional dynamics';
  var educCtx=bachNum>=35?'a highly educated workforce with '+d.bachelorsPlus+' holding bachelor\'s degrees or higher, well-suited to professional, technology, and knowledge-economy tenants':bachNum>=25?'a skilled workforce with '+d.bachelorsPlus+' holding bachelor\'s degrees, supporting a diverse tenant mix':'a workforce with '+d.bachelorsPlus+' holding bachelor\'s degrees, with strong representation suited to industrial and trades-oriented occupiers';
  var instrLower=instructions.toLowerCase();
  var focusInd=instrLower.indexOf('industrial')>=0||instrLower.indexOf('logistic')>=0||instrLower.indexOf('warehouse')>=0||instrLower.indexOf('distribution')>=0;
  var focusOfc=instrLower.indexOf('office')>=0||instrLower.indexOf('tech')>=0||instrLower.indexOf('professional')>=0;
  var focusLP=instrLower.indexOf(' lp')>=0||instrLower.indexOf('investor')>=0||instrLower.indexOf('fund')>=0;
  var p1=city+' represents a '+d.radius+'-mile trade area encompassing '+d.pop.toLocaleString()+' residents as of the 2020 Census — '+d.natComparison+' and '+d.stateComparison+'. The market has demonstrated demographic '+(growSign==='growth'?'momentum, recording '+d.growthNote.replace(/[▲▼]/g,'').trim()+' since the 2010 Census baseline, reflecting sustained demand for commercial occupancy.':growSign==='contraction'?'contraction of '+d.growthNote.replace(/[▲▼]/g,'').trim()+' since 2010, warranting careful underwriting of absorption assumptions.':'stability relative to the 2010 Census baseline, consistent with a mature, predictable commercial market.');
  var p2='The income profile supports a '+incTier+' consumer and labor base. Median household income of '+d.income+' is anchored by median home values of '+d.homeValue+' and an average household size of '+d.avgHHSize+', reflecting genuine residential wealth accumulation and homeownership stability. These fundamentals underpin rent-paying capacity for retail, service, and professional commercial tenants.';
  var p3='The labor pool is '+laborQual+', with '+unempCtx+'. A working-age population (16+) of '+d.workingAgePop+' and a labor force participation rate of '+d.lfpr+' provide '+(focusInd?'substantial workforce depth for distribution, manufacturing, and light industrial operations at scale. ':focusOfc?'a talent base well-positioned to support office, professional services, and technology users seeking suburban locations. ':'meaningful depth across industrial, office, and service sector tenants. ')+educCtx+'.';
  var p4=d.employerBiz+' employer establishments across '+d.bizZips+' underscore a diversified local economy anchored by '+d.topSectors+'. This sector breadth limits single-industry concentration risk and sustains a resilient, multi-tenant commercial environment. '+(focusInd?'Interstate connectivity via '+d.interstates+', proximity to '+d.nearestAirport+', and access to '+d.nearestPort+' collectively position the market as a competitive node for last-mile distribution and logistics-oriented tenants.':'Multimodal transportation infrastructure — including interstate access via '+d.interstates+', proximity to '+d.nearestAirport+', and '+d.nearestPort+' — supports a broad occupier universe spanning logistics, professional services, and retail.');
  var p5=(focusLP?'For institutional investors, t':'T')+'he subject trade area offers a compelling convergence of '+incTier+' household income, '+(growSign==='growth'?'positive demographic momentum,':growSign==='contraction'?'stable legacy commercial demand despite moderate population trends,':'demographic stability,')+' and multimodal transportation access, consistent with a '+(incTier==='exceptional'||incTier==='strong'?'core-adjacent, stabilized':'value-add')+' commercial real estate investment thesis.';
  var result=[p1,p2,p3,p4,p5].join('\n\n');
  if(instructions&&instructions.length>10) result+='\n\nAnalyst Context: '+instructions.charAt(0).toUpperCase()+instructions.slice(1)+(instructions.slice(-1)==='.'?'':'.');
  return result;
}

async function runSlot(s,addr,r){
  resetSlot(s);
  el('col-'+s).classList.add('vis');

    hwyElementsAll=[];
    if(hwyMapLayer){MAP.removeLayer(hwyMapLayer);hwyMapLayer=null;}
    clearExits();
    clearPortCircles();
    // Only clear drive layers/cache if we're actually running circle mode
    // (don't reset drive state if compare+drive is running both slots)
    if(analysisMode!=='drive'||!compareMode){
      if(driveLayer[0]){MAP.removeLayer(driveLayer[0]);driveLayer[0]=null;}
      if(driveLayer[1]){MAP.removeLayer(driveLayer[1]);driveLayer[1]=null;}
      driveCache[0]=null; driveActive=false;

      var co2=el('circle-options');if(co2)co2.style.display='flex';

    }

    var mb=el('mb-circle');if(mb)mb.classList.add('on');
    var mb2=el('mb-drive');if(mb2)mb2.classList.remove('on');
    var apb=el('add-port-btn');if(apb)apb.style.display='none';
    if(!portReturnMode){var bb=el('port-back-btn');if(bb)bb.classList.remove('vis');}
    var bi=el('broker-intel');if(bi)bi.classList.remove('vis');
    document.querySelectorAll('.broker-btn').forEach(function(b){b.classList.remove('active');});
  }
  if(s===0&&analysisMode!=='drive'){clearDriveTime();}

  setStep('geo');
  var geo=await geocode(addr);
  var lat=geo.lat,lon=geo.lon;
  slotCache[s].lat=lat;slotCache[s].lon=lon;
  var shortAddr=geo.display.split(',').slice(0,3).join(',');

  if(compareMode){var cb=el('cb-'+(['a','b'][s]));if(cb)cb.textContent=shortAddr.split(',')[0];el('compare-banner').classList.add('vis');}
  showPulse(lat,lon,r);
  // Only draw circle placeholder if running in circle mode
  if(analysisMode!=='drive') drawSlot(s,lat,lon,r,null,null);

  var rawGeo=geo.rawData&&geo.rawData[0];
  var addrObj=rawGeo&&rawGeo.address||{};
  var city=addrObj.city||addrObj.town||addrObj.village||addrObj.county||'';
  var state=addrObj.state||'';
  setStep('census');
  var bgs=await fetchBGs(lat,lon,r);
  if(!bgs.length) throw new Error('No populated areas in radius');

  var pop=0,hu=0;
  bgs.forEach(function(bg){pop+=(bg.POP100||0);hu+=(bg.HU100||0);});
  var area=parseFloat((Math.PI*r*r).toFixed(1));
  var stateFips=bgs[0].GEOID.slice(0,2);

  el('rbg-'+s).textContent=fmt(bgs.length);
  renderPop(s,pop,hu,area);
  el('pop20-'+s).textContent=fmt(pop);
  el('pop20-'+s).classList.remove('pending');

  // All async in parallel
  setStep('income');
  var results=await Promise.allSettled([
    fetchIncomeLabor(bgs),
    fetchBiz(lat,lon,r),
    fetchState(stateFips),
    fetchHwy(lat,lon),
    fetch2010(bgs),
    fetchTenure(bgs),
  ]);
  var airData=getNearestAirport(lat,lon);

  var stateData=results[2].status==='fulfilled'?results[2].value:null;

  var hwyRaw=results[3].status==='fulfilled'?results[3].value:null;
  var hwyData=hwyRaw&&hwyRaw.hwys?hwyRaw.hwys:(hwyRaw&&Array.isArray(hwyRaw)?hwyRaw:null);
  var hwyElements=hwyRaw&&hwyRaw.elements?hwyRaw.elements:null;
  // If hwy failed, retry once in background and update transport card when ready
  if(!hwyElements&&slotCache[s].lat){
    setTimeout(async function(){
      try{
        var retry=await fetchHwy(lat,lon);
        if(retry&&retry.hwys){
          renderTransport(s,retry.hwys,airData,portData);
          if(retry.elements) drawHighways(retry.elements);
        }
      }catch(e){}
    },3000);
  }
  var data2010=results[4].status==='fulfilled'?results[4].value:null;
  setStep('transport');
  var portData=getNearestPort(lat,lon);
  setTimeout(initCollapsible, 100);

  slotCache[s].stateData=stateData;
  renderComparisons(s,pop,area,stateData);
  renderGrowth(s,pop,data2010);
  if(data2010) slotCache[s].pop10=data2010.pop;
  if(incData) renderIncome(s,incData.income,incData.lfpr,incData.unempRate,incData.bachRate,incData.homeValue,incData.workingAgePop,hu,stateData);
  else renderIncome(s,null,null,null,null,null,null,null,stateData);
  renderBiz(s,bizData,stateData);
  renderTenure(s,tenureData,stateData);
  renderTransport(s,hwyData,airData,portData);
  if(hwyElements) drawHighways(hwyElements);
  // Cache circle results for toggle (both slots)
  if(incData) slotCache[s].circleCache={pop:pop,hu:hu,area:area,lat:lat,lon:lon,r:r,stateData:stateData,
    income:incData.income,lfpr:incData.lfpr,unempRate:incData.unempRate,
    bachRate:incData.bachRate,homeValue:incData.homeValue,workingAgePop:incData.workingAgePop,
    bizData:bizData,data2010:data2010&&data2010,hwyData:hwyData,hwyElements:hwyElements,ownerRate:tenureData,exitElements:null};
  // Fetch exits — draw immediately and cache for mode toggle
  if(hwyElements){
    var _hwyEl=hwyElements,_lat=lat,_lon=lon,_r=r,_s=s;
    fetchExits(_lat,_lon,_r).then(function(exits){
      if(exits){
        if(slotCache[_s].circleCache) slotCache[_s].circleCache.exitElements=exits;
        if(analysisMode!=='drive') drawExits(exits,_hwyEl,_lat,_lon);
      }
    }).catch(function(){});
  }
  // Fire EPA in background
  if(s===0)
  if(incData){slotCache[s].income=incData.income;slotCache[s].inc=incData.income;if(incData.homeValue)slotCache[s].hmv=incData.homeValue;}
  if(bizData) slotCache[s].biz=bizData;
  if(hwyData) slotCache[s].hwy=hwyData;
  stopPulse();
  clearSteps();
  // Only draw circle if in circle mode; drive mode draws via applyDriveResults
  if(analysisMode!=='drive') drawSlot(s,lat,lon,r,pop,incData?incData.income:null);
  updateURL();
}

// ═══════════════ MAIN RUN ═══════════════
async function run(){
  var addrA=el('inp-a').value.trim();
  if(!addrA){showErr('Please enter an address.');return;}
  clearErr();
  el('btn').disabled=true;
  // Set mode state once here before any slot functions run
  var usingDrive=!!(driveMin&&analysisMode==='drive');
  // Lock in mode state before any async operations
  if(usingDrive) analysisMode='drive';
  setStatus('run',compareMode?'Running both locations…':'Analyzing…');
  try{
    if(compareMode){
      var addrB=el('inp-b').value.trim();
      if(!addrB){
        if(driveMin&&analysisMode==='drive') await runDriveFirst(0,addrA,driveMin);
        else await runSlot(0,addrA,radius);
      } else {
        if(driveMin&&analysisMode==='drive'){
          await Promise.all([runDriveFirst(0,addrA,driveMin),runDriveFirst(1,addrB,driveMin)]);
        } else {
          await Promise.all([runSlot(0,addrA,radius),runSlot(1,addrB,radius)]);
        }
      }
    } else {
      el('col-1').classList.remove('vis');
      if(driveMin&&analysisMode==='drive'){
        await runDriveFirst(0,addrA,driveMin);
      } else {
        analysisMode='circle';
        el('mb-circle').classList.add('on');
        el('mb-drive').classList.remove('on');
        await runSlot(0,addrA,radius);
      }
    }
    setStatus('ok','Analysis complete');
    showSaveBtn();
    // Sync tab UI to what actually ran
    var isDriveResult=usingDrive&&driveCache[0];
    var mtcR=el('mtab-circle'),mtdR=el('mtab-drive');
    var coR=el('circle-options'),droR=el('drive-options');
    if(isDriveResult){
      if(mtcR)mtcR.classList.remove('active');
      if(mtdR)mtdR.classList.add('active');
      if(coR)coR.style.display='none';
      if(droR)droR.classList.add('vis');
    } else {
      if(mtcR)mtcR.classList.add('active');
      if(mtdR)mtdR.classList.remove('active');
      if(coR)coR.style.display='flex';
      if(droR)droR.classList.remove('vis');
    }
    updateAnalyzeBtn();
    // Fade map hint after first successful analysis
    var mh=document.getElementById('map-hint');
    if(mh) setTimeout(function(){mh.classList.add('fade');},1200);
    var gsb=el('gen-summary-btn');if(gsb)gsb.classList.add('vis');
    var bi=el('broker-intel');if(bi)bi.classList.add('vis');
    el('mode-toggle').classList.add('vis');
    var apb=el('add-port-btn');if(apb)apb.style.display='block';
    if(compareMode&&slotCache[0].pop&&slotCache[1].pop) renderDeltas(0,1);
    // Auto-fit map to all active layers
    setTimeout(function(){
      try{
        var allBounds=[];
        [0,1].forEach(function(s){
          if(driveLayer[s]) allBounds.push(driveLayer[s].getBounds());
          else if(circles[s]) allBounds.push(circles[s].getBounds());
        });
        if(allBounds.length===1) MAP.fitBounds(allBounds[0],{padding:[50,50]});
        else if(allBounds.length===2) MAP.fitBounds(allBounds[0].extend(allBounds[1]),{padding:[50,50]});
      }catch(e){}
    }, 400);
  }catch(e){
    stopPulse();
    clearSteps();
    setStatus('err','Error');
    showErr(e.message||String(e));
  }finally{
    el('btn').disabled=false;
  }
}

async function runDriveFirst(s,addr,min){
  resetSlot(s);
  el('col-'+s).classList.add('vis');
  setStep('geo');
  var geo=await geocode(addr);
  var lat=geo.lat,lon=geo.lon;
  slotCache[s].lat=lat;slotCache[s].lon=lon;
  var shortAddr=geo.display.split(',').slice(0,3).join(',');
  el('ra-'+s).textContent=shortAddr;
  // No showPulse in drive mode - drive polygon is the visual feedback
  if(!compareMode) showPulse(lat,lon,radius);
  var airData=getNearestAirport(lat,lon);
  var portData=getNearestPort(lat,lon);
  setStep('transport');
  var hwyResult=await fetchHwy(lat,lon);
  var hwyData=hwyResult&&hwyResult.hwys?hwyResult.hwys:null;
  var hwyElements=hwyResult&&hwyResult.elements?hwyResult.elements:null;
  renderTransport(s,hwyData,airData,portData);
  if(hwyElements) drawHighways(hwyElements);
  // Fetch and draw exits for drive mode
  if(hwyElements){
    fetchExits(lat,lon,15).then(function(exits){
      if(exits) drawExits(exits,hwyElements,lat,lon);
    }).catch(function(){});
  }
  // Retry highways if failed
  if(!hwyElements){
    setTimeout(async function(){
      try{
        var retry=await fetchHwy(lat,lon);
        if(retry&&retry.hwys){
          renderTransport(s,retry.hwys,airData,portData);
          if(retry.elements) drawHighways(retry.elements);
        }
      }catch(e){}
    },3000);
  }
  // Run drive time analysis (mode state managed by run())
  await runDriveAnalysis(s,lat,lon,min);
}

 draw exits for drive mode
  if(hwyElements){
    fetchExits(lat,lon,15).then(function(exits){
      if(exits) drawExits(exits,hwyElements,lat,lon);
    }).catch(function(){});
  }
  // Retry highways if failed
  if(!hwyElements){
    setTimeout(async function(){
      try{
        var retry=await fetchHwy(lat,lon);
        if(retry&&retry.hwys){
          renderTransport(s,retry.hwys,airData,portData);
          if(retry.elements) drawHighways(retry.elements);
        }
      }catch(e){}
    },3000);
  }
  // Run drive time analysis (mode state managed by run())
  await runDriveAnalysis(s,lat,lon,min);
}
